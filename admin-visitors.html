<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PEP Visitor Analytics | Admin</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>👁️</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0f1a;
            --bg-secondary: #111827;
            --bg-card: #1a2234;
            --bg-card-hover: #1f2940;
            --border: #2a3548;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --accent-green: #22c55e;
            --accent-green-glow: rgba(34, 197, 94, 0.3);
            --accent-blue: #3b82f6;
            --accent-blue-glow: rgba(59, 130, 246, 0.3);
            --accent-purple: #8b5cf6;
            --accent-orange: #f59e0b;
            --accent-red: #ef4444;
            --online-pulse: #22c55e;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Animated background */
        .bg-pattern {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(ellipse 80% 50% at 50% -20%, rgba(59, 130, 246, 0.15), transparent),
                radial-gradient(ellipse 60% 40% at 100% 100%, rgba(139, 92, 246, 0.1), transparent);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 1400px;
            margin: 0 auto;
            padding: 24px;
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
            flex-wrap: wrap;
            gap: 16px;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        .logo-text h1 {
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--text-primary), var(--accent-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .logo-text span {
            font-size: 12px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .header-actions {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .btn {
            padding: 10px 20px;
            border-radius: 10px;
            border: none;
            font-family: inherit;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px var(--accent-blue-glow);
        }

        .btn-secondary {
            background: var(--bg-card);
            color: var(--text-primary);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            background: var(--bg-card-hover);
        }

        .notification-status {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: var(--bg-card);
            border-radius: 20px;
            font-size: 13px;
            color: var(--text-secondary);
        }

        .notification-status.enabled {
            color: var(--accent-green);
        }

        .notification-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--text-muted);
        }

        .notification-status.enabled .notification-dot {
            background: var(--accent-green);
            animation: pulse 2s infinite;
        }

        /* Stats Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 32px;
        }

        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            position: relative;
            overflow: hidden;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--accent-blue), var(--accent-purple));
            opacity: 0;
            transition: opacity 0.3s;
        }

        .stat-card:hover::before {
            opacity: 1;
        }

        .stat-card.online::before {
            background: var(--accent-green);
            opacity: 1;
        }

        .stat-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            margin-bottom: 16px;
        }

        .stat-card.online .stat-icon {
            background: rgba(34, 197, 94, 0.15);
        }

        .stat-card.today .stat-icon {
            background: rgba(59, 130, 246, 0.15);
        }

        .stat-card.total .stat-icon {
            background: rgba(139, 92, 246, 0.15);
        }

        .stat-card.countries .stat-icon {
            background: rgba(245, 158, 11, 0.15);
        }

        .stat-value {
            font-size: 36px;
            font-weight: 700;
            font-family: 'JetBrains Mono', monospace;
            margin-bottom: 4px;
        }

        .stat-card.online .stat-value {
            color: var(--accent-green);
        }

        .stat-label {
            font-size: 14px;
            color: var(--text-muted);
        }

        /* Visitors Section */
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 16px;
        }

        .section-title {
            font-size: 20px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .live-indicator {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 4px 12px;
            background: rgba(34, 197, 94, 0.15);
            border-radius: 20px;
            font-size: 12px;
            color: var(--accent-green);
            font-weight: 500;
        }

        .live-dot {
            width: 8px;
            height: 8px;
            background: var(--accent-green);
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.2); }
        }

        .filter-tabs {
            display: flex;
            gap: 8px;
        }

        .filter-tab {
            padding: 8px 16px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 13px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s;
        }

        .filter-tab:hover {
            background: var(--bg-card-hover);
        }

        .filter-tab.active {
            background: var(--accent-blue);
            border-color: var(--accent-blue);
            color: white;
        }

        /* Visitor Table */
        .visitors-table {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
        }

        .table-header {
            display: grid;
            grid-template-columns: 60px 2fr 1.5fr 1fr 1fr 100px;
            padding: 16px 24px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            font-size: 12px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .table-body {
            max-height: 600px;
            overflow-y: auto;
        }

        .visitor-row {
            display: grid;
            grid-template-columns: 60px 2fr 1.5fr 1fr 1fr 100px;
            padding: 16px 24px;
            border-bottom: 1px solid var(--border);
            align-items: center;
            transition: background 0.2s;
        }

        .visitor-row:hover {
            background: var(--bg-card-hover);
        }

        .visitor-row:last-child {
            border-bottom: none;
        }

        .visitor-status {
            display: flex;
            justify-content: center;
        }

        .status-badge {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .status-badge.online {
            background: rgba(34, 197, 94, 0.15);
            color: var(--accent-green);
            animation: glow-green 2s infinite;
        }

        @keyframes glow-green {
            0%, 100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.4); }
            50% { box-shadow: 0 0 12px 2px rgba(34, 197, 94, 0.2); }
        }

        .status-badge.offline {
            background: rgba(100, 116, 139, 0.15);
            color: var(--text-muted);
        }

        .visitor-location {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .country-flag {
            font-size: 28px;
            line-height: 1;
        }

        .location-details {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .location-country {
            font-weight: 600;
            font-size: 14px;
        }

        .location-city {
            font-size: 12px;
            color: var(--text-muted);
        }

        .visitor-browser {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .browser-icon {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            background: var(--bg-secondary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .browser-details {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .browser-name {
            font-size: 14px;
            font-weight: 500;
        }

        .browser-os {
            font-size: 12px;
            color: var(--text-muted);
        }

        .visitor-time {
            font-family: 'JetBrains Mono', monospace;
            font-size: 14px;
        }

        .visitor-duration {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .duration-value {
            font-family: 'JetBrains Mono', monospace;
            font-size: 14px;
            font-weight: 500;
        }

        .duration-label {
            font-size: 11px;
            color: var(--text-muted);
        }

        .visitor-pages {
            text-align: center;
        }

        .pages-count {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
            background: var(--bg-secondary);
            border-radius: 8px;
            font-weight: 600;
            font-size: 14px;
        }

        /* Empty State */
        .empty-state {
            padding: 60px 24px;
            text-align: center;
        }

        .empty-icon {
            font-size: 48px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        .empty-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .empty-text {
            color: var(--text-muted);
            font-size: 14px;
        }

        /* Loading */
        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 60px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border);
            border-top-color: var(--accent-blue);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Toast Notification */
        .toast-container {
            position: fixed;
            top: 24px;
            right: 24px;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .toast {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-left: 4px solid var(--accent-green);
            border-radius: 12px;
            padding: 16px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            animation: slideIn 0.3s ease-out;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            min-width: 320px;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .toast-flag {
            font-size: 32px;
        }

        .toast-content {
            flex: 1;
        }

        .toast-title {
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 2px;
        }

        .toast-message {
            font-size: 12px;
            color: var(--text-muted);
        }

        .toast-close {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 18px;
            padding: 4px;
        }

        /* Responsive */
        @media (max-width: 1024px) {
            .table-header,
            .visitor-row {
                grid-template-columns: 50px 1.5fr 1fr 1fr 80px;
            }
            
            .visitor-pages {
                display: none;
            }
        }

        @media (max-width: 768px) {
            .container {
                padding: 16px;
            }

            .header {
                flex-direction: column;
                align-items: flex-start;
            }

            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .table-header {
                display: none;
            }

            .visitor-row {
                display: flex;
                flex-direction: column;
                gap: 12px;
                padding: 20px;
            }

            .visitor-status {
                position: absolute;
                top: 16px;
                right: 16px;
            }

            .visitor-row {
                position: relative;
            }
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-secondary);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-muted);
        }
    </style>
</head>
<body>
    <div class="bg-pattern"></div>
    
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="header-left">
                <div class="logo">
                    <div class="logo-icon">👁️</div>
                    <div class="logo-text">
                        <h1>PEP Analytics</h1>
                        <span>Visitor Tracking</span>
                    </div>
                </div>
            </div>
            <div class="header-actions">
                <div class="notification-status" id="notificationStatus">
                    <span class="notification-dot"></span>
                    <span>Notifications Off</span>
                </div>
                <button class="btn btn-primary" id="enableNotifications">
                    🔔 Enable Notifications
                </button>
                <button class="btn btn-secondary" onclick="loadVisitors()">
                    ↻ Refresh
                </button>
            </div>
        </header>

        <!-- Stats -->
        <div class="stats-grid">
            <div class="stat-card online">
                <div class="stat-icon">🟢</div>
                <div class="stat-value" id="onlineCount">0</div>
                <div class="stat-label">Online Now</div>
            </div>
            <div class="stat-card today">
                <div class="stat-icon">📊</div>
                <div class="stat-value" id="todayCount">0</div>
                <div class="stat-label">Today's Visitors</div>
            </div>
            <div class="stat-card total">
                <div class="stat-icon">👥</div>
                <div class="stat-value" id="totalCount">0</div>
                <div class="stat-label">Total Visitors</div>
            </div>
            <div class="stat-card countries">
                <div class="stat-icon">🌍</div>
                <div class="stat-value" id="countryCount">0</div>
                <div class="stat-label">Countries</div>
            </div>
        </div>

        <!-- Visitors Section -->
        <div class="section-header">
            <div class="section-title">
                <span>Recent Visitors</span>
                <div class="live-indicator">
                    <span class="live-dot"></span>
                    LIVE
                </div>
            </div>
            <div class="filter-tabs">
                <button class="filter-tab active" data-filter="all">All</button>
                <button class="filter-tab" data-filter="online">Online Only</button>
            </div>
        </div>

        <div class="visitors-table">
            <div class="table-header">
                <div>Status</div>
                <div>Location</div>
                <div>Browser / OS</div>
                <div>First Visit</div>
                <div>Duration</div>
                <div>Pages</div>
            </div>
            <div class="table-body" id="visitorsBody">
                <div class="loading">
                    <div class="spinner"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>

    <script>
        const TRACKER_URL = 'https://visitor-tracker.kurosoft01.workers.dev';
        const REFRESH_INTERVAL = 10000; // 10 seconds
        
        let visitors = [];
        let currentFilter = 'all';
        let knownVisitorIds = new Set();

        // Browser icons
        const browserIcons = {
            'Chrome': '🌐',
            'Firefox': '🦊',
            'Safari': '🧭',
            'Edge': '📘',
            'Opera': '🔴',
            'Unknown': '🌍'
        };

        // Country flag from code
        function getCountryFlag(code) {
            if (!code || code === 'XX') return '🌍';
            const codePoints = code
                .toUpperCase()
                .split('')
                .map(char => 127397 + char.charCodeAt(0));
            return String.fromCodePoint(...codePoints);
        }

        // Format duration
        function formatDuration(seconds) {
            if (seconds < 60) return `${seconds}s`;
            if (seconds < 3600) return `${Math.floor(seconds / 60)}m ${seconds % 60}s`;
            const hours = Math.floor(seconds / 3600);
            const mins = Math.floor((seconds % 3600) / 60);
            return `${hours}h ${mins}m`;
        }

        // Format time ago
        function formatTimeAgo(timestamp) {
            const seconds = Math.floor((Date.now() - timestamp) / 1000);
            if (seconds < 60) return 'Just now';
            if (seconds < 3600) return `${Math.floor(seconds / 60)}m ago`;
            if (seconds < 86400) return `${Math.floor(seconds / 3600)}h ago`;
            return `${Math.floor(seconds / 86400)}d ago`;
        }

        // Show toast notification
        function showToast(visitor) {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerHTML = `
                <span class="toast-flag">${getCountryFlag(visitor.country)}</span>
                <div class="toast-content">
                    <div class="toast-title">New Visitor from ${visitor.countryName}</div>
                    <div class="toast-message">${visitor.city} • ${visitor.browser} on ${visitor.os}</div>
                </div>
                <button class="toast-close" onclick="this.parentElement.remove()">×</button>
            `;
            container.appendChild(toast);

            // Auto remove after 5 seconds
            setTimeout(() => {
                if (toast.parentElement) {
                    toast.style.animation = 'slideIn 0.3s ease-out reverse';
                    setTimeout(() => toast.remove(), 300);
                }
            }, 5000);

            // Play sound if available
            playNotificationSound();
        }

        // Play notification sound
        function playNotificationSound() {
            try {
                const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioContext.createOscillator();
                const gainNode = audioContext.createGain();
                
                oscillator.connect(gainNode);
                gainNode.connect(audioContext.destination);
                
                oscillator.frequency.value = 800;
                oscillator.type = 'sine';
                gainNode.gain.value = 0.1;
                
                oscillator.start();
                oscillator.stop(audioContext.currentTime + 0.15);
            } catch (e) {}
        }

        // Render visitors
        function renderVisitors() {
            const container = document.getElementById('visitorsBody');
            let filtered = visitors;

            if (currentFilter === 'online') {
                filtered = visitors.filter(v => v.isOnline);
            }

            if (filtered.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">👀</div>
                        <div class="empty-title">No visitors ${currentFilter === 'online' ? 'online' : ''} yet</div>
                        <div class="empty-text">Visitors will appear here in real-time</div>
                    </div>
                `;
                return;
            }

            container.innerHTML = filtered.map(v => `
                <div class="visitor-row">
                    <div class="visitor-status">
                        <span class="status-badge ${v.isOnline ? 'online' : 'offline'}">
                            ${v.isOnline ? '● Online' : 'Offline'}
                        </span>
                    </div>
                    <div class="visitor-location">
                        <span class="country-flag">${getCountryFlag(v.country)}</span>
                        <div class="location-details">
                            <span class="location-country">${v.countryName || v.country}</span>
                            <span class="location-city">${v.city || 'Unknown'}</span>
                        </div>
                    </div>
                    <div class="visitor-browser">
                        <div class="browser-icon">${browserIcons[v.browser] || '🌐'}</div>
                        <div class="browser-details">
                            <span class="browser-name">${v.browser} ${v.browserVersion || ''}</span>
                            <span class="browser-os">${v.os} • ${v.device}</span>
                        </div>
                    </div>
                    <div class="visitor-time">${formatTimeAgo(v.firstVisit)}</div>
                    <div class="visitor-duration">
                        <span class="duration-value">${formatDuration(v.totalTime || 0)}</span>
                        <span class="duration-label">${v.isOnline ? 'active session' : 'total time'}</span>
                    </div>
                    <div class="visitor-pages">
                        <span class="pages-count">${v.pageViews || 1}</span>
                    </div>
                </div>
            `).join('');
        }

        // Load visitors from API
        async function loadVisitors() {
            try {
                const response = await fetch(`${TRACKER_URL}/visitors?limit=100`);
                const data = await response.json();

                // Check for new visitors
                const newVisitors = data.visitors.filter(v => !knownVisitorIds.has(v.id));
                
                // Update known visitors
                data.visitors.forEach(v => knownVisitorIds.add(v.id));

                // Show toast for new online visitors
                newVisitors.forEach(v => {
                    if (v.isOnline && knownVisitorIds.size > data.visitors.length) {
                        showToast(v);
                    }
                });

                visitors = data.visitors;
                
                // Update stats
                document.getElementById('onlineCount').textContent = data.onlineCount || 0;
                document.getElementById('todayCount').textContent = data.totalToday || 0;
                document.getElementById('totalCount').textContent = data.totalAll || 0;
                
                // Count unique countries
                const countries = new Set(visitors.map(v => v.country));
                document.getElementById('countryCount').textContent = countries.size;

                renderVisitors();
            } catch (error) {
                console.error('Failed to load visitors:', error);
            }
        }

        // Push notification subscription
        async function subscribeToPush() {
            if (!('serviceWorker' in navigator) || !('PushManager' in window)) {
                alert('Push notifications are not supported in this browser');
                return;
            }

            try {
                const permission = await Notification.requestPermission();
                if (permission !== 'granted') {
                    alert('Notification permission denied');
                    return;
                }

                // Register service worker
                const registration = await navigator.serviceWorker.register('/sw.js');
                
                // Subscribe to push
                const subscription = await registration.pushManager.subscribe({
                    userVisibleOnly: true,
                    applicationServerKey: urlBase64ToUint8Array('YOUR_VAPID_PUBLIC_KEY')
                });

                // Send subscription to server
                await fetch(`${TRACKER_URL}/subscribe`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(subscription)
                });

                updateNotificationStatus(true);
                alert('Push notifications enabled!');
            } catch (error) {
                console.error('Failed to subscribe:', error);
                alert('Failed to enable notifications. Using in-app notifications instead.');
                updateNotificationStatus(true);
            }
        }

        function urlBase64ToUint8Array(base64String) {
            const padding = '='.repeat((4 - base64String.length % 4) % 4);
            const base64 = (base64String + padding)
                .replace(/-/g, '+')
                .replace(/_/g, '/');
            const rawData = window.atob(base64);
            const outputArray = new Uint8Array(rawData.length);
            for (let i = 0; i < rawData.length; ++i) {
                outputArray[i] = rawData.charCodeAt(i);
            }
            return outputArray;
        }

        function updateNotificationStatus(enabled) {
            const status = document.getElementById('notificationStatus');
            const btn = document.getElementById('enableNotifications');
            
            if (enabled) {
                status.classList.add('enabled');
                status.innerHTML = '<span class="notification-dot"></span><span>Notifications On</span>';
                btn.style.display = 'none';
                localStorage.setItem('notifications_enabled', 'true');
            }
        }

        // Filter tabs
        document.querySelectorAll('.filter-tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                currentFilter = tab.dataset.filter;
                renderVisitors();
            });
        });

        // Enable notifications button
        document.getElementById('enableNotifications').addEventListener('click', subscribeToPush);

        // Check if notifications were previously enabled
        if (localStorage.getItem('notifications_enabled') === 'true') {
            updateNotificationStatus(true);
        }

        // Initial load
        loadVisitors();

        // Auto refresh
        setInterval(loadVisitors, REFRESH_INTERVAL);

        // Page visibility handling
        document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'visible') {
                loadVisitors();
            }
        });
    </script>
</body>
</html>
